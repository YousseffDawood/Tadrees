  <main class="main-content">

      <img class="page-banner-img" id="banner-img" src="" alt=""/>

    </div>
    <div class="page-body">
      <div class="page-header">
        <div class="search-bar" style="min-width:260px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" id="search-input" placeholder="Search subjects..."/></div>
        <button class="btn btn-primary" id="btn-add-subject"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Subject</button>

<!-- Subject Modal -->
<div class="modal-backdrop" id="subject-modal">
  <div class="modal">
    <div class="modal-header"><h3 id="subject-modal-title">Add Subject</h3><button class="modal-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-subject-id"/>
      <div class="form-group"><label class="form-label">Subject Name <span>*</span></label><input class="form-control" id="sub-name" placeholder="e.g. Mathematics"/></div>
      <div class="form-group"><label class="form-label">Description <span>*</span></label><textarea class="form-control" id="sub-desc" placeholder="Brief description of the subject..."></textarea></div>
      <div class="form-group"><label class="form-label">Price (EGP)</label><input class="form-control" id="sub-price" type="number" step="0.01" placeholder="0.00"/></div>
      <div class="form-group">
        <label class="form-label">Assign Teachers</label>
        <div id="teachers-checkboxes" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:180px;overflow-y:auto;padding:10px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">
          <div class="loading-center" style="padding:20px"><div class="spinner spinner-sm"></div></div>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary modal-close">Cancel</button><button class="btn btn-primary" id="btn-save-subject">Save Subject</button></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js?v=2"></script>
<script>
(function(){const img=document.getElementById('banner-img');const exts=['jpg','jpeg','png','webp'];let i=0;img.onerror=()=>{if(++i<exts.length)img.src=`wallpapers/subjects.${exts[i]}`;};img.src=`wallpapers/subjects.${exts[0]}`;})();

let allSubjects = [];
let allTeachers = [];
let editingId = null;

async function loadAll() {
  const container = document.getElementById('subjects-container');
  renderLoading(container);
  try {
    const [sRes, tRes] = await Promise.all([api.get('/api/academics/subjects/'), api.get('/api/users/teachers/')]);
    if (sRes.networkError) throw new Error(sRes.message);
    if (!sRes.ok) throw new Error(sRes.message || 'Failed to load subjects');
    allSubjects = sRes.data;
    allTeachers = tRes.ok ? tRes.data : [];
    renderSubjects(allSubjects, container);
  } catch (err) { renderError(container, err.message || 'Failed to load subjects.'); }
}

function renderSubjects(data, container) {
  if (!data.length) { renderEmpty(container, 'No subjects yet.', `<button class="btn btn-primary" onclick="openModal('subject-modal')">Add First Subject</button>`); return; }
  const colors = ['blue','violet','green','amber'];
  container.innerHTML = data.map((s, i) => {
    const clr = colors[i % colors.length];
    const teacherIds = (s.teacher || []).map(t => (typeof t === 'object' ? t.id : t)).filter(id => Number.isInteger(id));
    const teachers = allTeachers.filter(t => teacherIds.includes(t.id));
    return `<div class="card fade-in-up delay-${(i % 4) + 1}">
      <div class="card-header">
        <div>
          <div style="font-size:16px;font-weight:700">${s.name}</div>
          <span class="badge badge-${clr}" style="margin-top:4px">EGP ${parseFloat(s.price||0).toFixed(2)}</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm btn-edit-sub" data-id="${s.id}">Edit</button>
          <button class="btn btn-danger btn-sm btn-del-sub" data-id="${s.id}">Delete</button>
        </div>
      </div>
      <div class="card-body">
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:12px">${s.description||'No description.'}</p>
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px">TEACHERS (${teachers.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${teachers.length ? teachers.map(t=>`<span class="badge badge-gray">${t.name||t.phone||'?'}</span>`).join('') : '<span style="font-size:13px;color:var(--text-light)">No teachers assigned</span>'}
        </div>
      </div>
    </div>`;
  }).join('');
  container.querySelectorAll('.btn-edit-sub').forEach(b => b.addEventListener('click', () => openEdit(parseInt(b.dataset.id))));
  container.querySelectorAll('.btn-del-sub').forEach(b => b.addEventListener('click', () => deleteSub(parseInt(b.dataset.id))));
}

function renderTeacherCheckboxes(selectedIds = []) {
  const box = document.getElementById('teachers-checkboxes');
  if (!allTeachers.length) { box.innerHTML = '<span style="font-size:13px;color:var(--text-muted)">No teachers available</span>'; return; }
  box.innerHTML = allTeachers.filter(t => Number.isInteger(t.id)).map(t => `
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px">
      <input type="checkbox" name="teacher" value="${t.id}" ${selectedIds.includes(t.id)?'checked':''} style="width:15px;height:15px;accent-color:var(--primary)"/>
      ${t.name||t.phone||'?'}
    </label>`).join('');
}

function openEdit(id) {
  const s = allSubjects.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('subject-modal-title').textContent = 'Edit Subject';
  document.getElementById('sub-name').value  = s.name || '';
  document.getElementById('sub-desc').value  = s.description || '';
  document.getElementById('sub-price').value = s.price || 0;
  const teacherIds = (s.teacher || []).map(t => (typeof t === 'object' ? t.id : t)).filter(id => Number.isInteger(id));
  renderTeacherCheckboxes(teacherIds);
  openModal('subject-modal');
}

async function deleteSub(id) {
  if (!confirmAction('Delete this subject?')) return;
  const { ok, message } = await api.delete(`/api/academics/subjects/${id}/`);
  if (ok) { showToast('Subject deleted', 'success'); loadAll(); }
  else showToast(message || 'Failed to delete', 'error');
}

document.getElementById('search-input').addEventListener('input', debounce(e => {
  const q = e.target.value.toLowerCase();
  renderSubjects(allSubjects.filter(s => s.name.toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q)), document.getElementById('subjects-container'));
}));

document.getElementById('btn-add-subject').addEventListener('click', () => {
  editingId = null;
  document.getElementById('subject-modal-title').textContent = 'Add Subject';
  document.getElementById('sub-name').value = '';
  document.getElementById('sub-desc').value = '';
  document.getElementById('sub-price').value = '';
  renderTeacherCheckboxes([]);
  openModal('subject-modal');
});

document.getElementById('btn-save-subject').addEventListener('click', async () => {
  const btn = document.getElementById('btn-save-subject');
  const name = document.getElementById('sub-name').value.trim();
  const desc = document.getElementById('sub-desc').value.trim();
  if (!name || !desc) { showToast('Name and description are required', 'warning'); return; }
  const selectedTeachers = [...document.querySelectorAll('input[name="teacher"]:checked')]
    .map(c => parseInt(c.value, 10))
    .filter(id => Number.isInteger(id));
  const body = { name, description: desc, price: parseFloat(document.getElementById('sub-price').value||0), teacher: selectedTeachers };
  setSubmitting(btn, true);
  try {
    const { ok, data, networkError, message } = editingId
      ? await api.patch(`/api/academics/subjects/${editingId}/`, body)
      : await api.post('/api/academics/subjects/', body);
    if (networkError) showToast(message, 'error');
    else if (!ok) showToast(message || formatApiError(data), 'error');
    else { showToast(editingId ? 'Subject updated!' : 'Subject added!', 'success'); closeModal('subject-modal'); loadAll(); }
  } catch (err) { showToast(err.message || 'Network error', 'error'); }
  setSubmitting(btn, false);
});

loadAll();
</script>
