  <main class="main-content">
    <div class="page-banner">
      <img class="page-banner-img" id="banner-img" src="" alt=""/>
      <div class="page-banner-content"><h1>Add Staff</h1><p>Create new system users, receptionists, and managers</p></div>
    </div>
    <div class="page-body" style="max-width: 800px; margin: 0 auto;">
      <div class="card">
        <div class="card-body" style="padding: 30px;">
          <h3 style="margin-top:0;margin-bottom:20px;" class="fade-in-up delay-1">Staff Registration Form</h3>
          <div class="form-row fade-in-up delay-2">
            <div class="form-group">
              <label class="form-label">Username <span>*</span></label>
              <input class="form-control" type="text" id="staff-username" placeholder="e.g. ahmed_ali"/>
            </div>
            <div class="form-group">
              <label class="form-label">Email <span>*</span></label>
              <input class="form-control" type="email" id="staff-email" placeholder="e.g. ahmed@tadrees.com"/>
            </div>
          </div>
          <div class="form-row fade-in-up delay-3">
            <div class="form-group">
              <label class="form-label">Phone Number <span>*</span></label>
              <input class="form-control" type="text" id="staff-phone" placeholder="e.g. 010xxxxxxxx"/>
            </div>
            <div class="form-group">
              <label class="form-label">Role Title <span>*</span></label>
              <input class="form-control" type="text" id="staff-role" placeholder="e.g. Receptionist, Manager"/>
            </div>
          </div>
          <div class="form-row fade-in-up delay-3">
            <div class="form-group">
              <label class="form-label">Department <span>*</span></label>
              <input class="form-control" type="text" id="staff-dept" placeholder="e.g. Customer Service, Administration"/>
            </div>
          </div>
          <div class="form-row fade-in-up delay-4">
            <div class="form-group">
              <label class="form-label">Password <span>*</span></label>
              <input class="form-control" type="password" id="staff-pass" placeholder="••••••••"/>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm Password <span>*</span></label>
              <input class="form-control" type="password" id="staff-conf" placeholder="••••••••"/>
            </div>
          </div>
          <div class="fade-in-up delay-4" style="margin-top:24px;text-align:right;">
            <button class="btn btn-primary" id="btn-submit-staff" style="padding:10px 24px;">Register Staff</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js?v=2"></script>
<script>
(function(){const img=document.getElementById('banner-img');const exts=['jpg','jpeg','png','webp'];let i=0;img.onerror=()=>{if(++i<exts.length)img.src=`wallpapers/add-staff.${exts[i]}`;};img.src=`wallpapers/add-staff.${exts[0]}`;})();

document.getElementById('btn-submit-staff').addEventListener('click', async () => {
  const btn = document.getElementById('btn-submit-staff');
  const username = document.getElementById('staff-username').value.trim();
  const email = document.getElementById('staff-email').value.trim();
  const phone = document.getElementById('staff-phone').value.trim();
  const roleTitle = document.getElementById('staff-role').value.trim();
  const department = document.getElementById('staff-dept').value.trim();
  const password = document.getElementById('staff-pass').value;
  const confirmPassword = document.getElementById('staff-conf').value;

  if (!username || !email || !phone || !roleTitle || !department || !password || !confirmPassword) {
    showToast('All fields are required', 'warning');
    return;
  }

  if (password !== confirmPassword) {
    showToast('Passwords do not match', 'warning');
    return;
  }

  const payload = {
    username,
    email,
    name: username,
    phone,
    password,
    confirm_password: confirmPassword
  };

  setSubmitting(btn, true);
  try {
    const { ok, data, networkError, message } = await api.post('/api/users/staff/', payload);
    if (networkError) showToast(message, 'error');
    else if (!ok) showToast(message || formatApiError(data), 'error');
    else {
      showToast('Staff member registered successfully!', 'success');
      document.getElementById('staff-username').value = '';
      document.getElementById('staff-email').value = '';
      document.getElementById('staff-phone').value = '';
      document.getElementById('staff-role').value = '';
      document.getElementById('staff-dept').value = '';
      document.getElementById('staff-pass').value = '';
      document.getElementById('staff-conf').value = '';
    }
  } catch (err) { showToast(err.message || 'Network error occurred', 'error'); }
  setSubmitting(btn, false);
});
</script>
