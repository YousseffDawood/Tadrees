<!-- Add Student Modal -->
<div class="modal-backdrop" id="add-student-modal">
  <div class="modal">
    <div class="modal-header"><h3 id="student-modal-title">Add Student</h3><button class="modal-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-student-id"/>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name <span>*</span></label><input class="form-control" id="s-name" placeholder="Student full name"/></div>
        <div class="form-group"><label class="form-label">Phone <span>*</span></label><input class="form-control" id="s-phone" placeholder="010xxxxxxxx"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email <span>*</span></label><input class="form-control" type="email" id="s-email" placeholder="student@example.com"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Grade / Level</label><input class="form-control" id="s-grade" placeholder="e.g. Grade 10, Year 2"/></div>
        <div class="form-group"><label class="form-label">Parent Contact</label><input class="form-control" id="s-parent" placeholder="Parent phone or name"/></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary modal-close">Cancel</button><button class="btn btn-primary" id="btn-save-student">Save Student</button></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js?v=2"></script>
<script>
(function(){const img=document.getElementById('banner-img');const exts=['jpg','jpeg','png','webp'];let i=0;img.onerror=()=>{if(++i<exts.length)img.src=`wallpapers/students.${exts[i]}`;};img.src=`wallpapers/students.${exts[0]}`;})();

let allStudents = [];
let editingId = null;

async function loadStudents() {
  const tbody = document.getElementById('students-tbody');
  tbody.innerHTML = `<tr><td colspan="6"><div class="loading-center"><div class="spinner"></div></div></td></tr>`;
  try {
    const { ok, data, networkError, message } = await api.get('/api/users/students/');
    if (!ok) throw new Error(networkError ? message : 'Failed to load students');
    allStudents = data;
    renderStudents(allStudents, tbody);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6"><div style="padding:30px;text-align:center;color:var(--danger)">${err.message || 'Failed to load students.'}</div></td></tr>`;
  }
}

function renderStudents(data, tbody) {
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state" style="padding:40px 20px"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg></div><h3>No students yet</h3><p>Add the first student using the button above.</p></div></td></tr>`; return; }
  tbody.innerHTML = data.map((s, i) => `
    <tr class="fade-in-up delay-${(i % 4) + 1}">
      <td style="color:var(--text-muted);font-size:12px">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:10px"><div class="avatar avatar-sm">${initials(s.name||'?')}</div><span style="font-weight:600">${s.name||'—'}</span></div></td>
      <td><span class="badge badge-blue">${s.phone||'—'}</span></td>
      <td>${s.grade||'—'}</td>
      <td>${s.parent_contact||'—'}</td>
      <td><div class="table-actions">
        <button class="btn btn-secondary btn-sm btn-edit-student" data-id="${s.id}" title="Edit">✏️</button>
        <button class="btn btn-danger btn-sm btn-del-student" data-id="${s.id}" title="Delete">🗑️</button>
      </div></td>
    </tr>`).join('');
  tbody.querySelectorAll('.btn-edit-student').forEach(b => b.addEventListener('click', () => openEdit(parseInt(b.dataset.id))));
  tbody.querySelectorAll('.btn-del-student').forEach(b => b.addEventListener('click', () => deleteStudent(parseInt(b.dataset.id))));
}

function openEdit(id) {
  const s = allStudents.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('student-modal-title').textContent = 'Edit Student';
  document.getElementById('s-name').value  = s.name || '';
  document.getElementById('s-phone').value = s.phone || '';
  document.getElementById('s-email').value = s.email || '';
  document.getElementById('s-grade').value = s.grade || '';
  document.getElementById('s-parent').value = s.parent_contact || '';
  openModal('add-student-modal');
}

async function deleteStudent(id) {
  if (!confirmAction('Delete this student?')) return;
  const { ok, message } = await api.delete(`/api/users/students/${id}/`);
  if (ok) { showToast('Student deleted', 'success'); loadStudents(); }
  else showToast(message || 'Failed to delete', 'error');
}

// Search
document.getElementById('search-input').addEventListener('input', debounce(e => {
  const q = e.target.value.toLowerCase();
  renderStudents(allStudents.filter(s => (s.name||'').toLowerCase().includes(q) || (s.phone||'').includes(q)), document.getElementById('students-tbody'));
}));

document.getElementById('btn-add-student').addEventListener('click', () => {
  editingId = null;
  document.getElementById('student-modal-title').textContent = 'Add Student';
  document.getElementById('s-name').value = '';
  document.getElementById('s-phone').value = '';
  document.getElementById('s-email').value = '';
  document.getElementById('s-grade').value = '';
  document.getElementById('s-parent').value = '';
  openModal('add-student-modal');
});

document.getElementById('btn-save-student').addEventListener('click', async () => {
  const btn = document.getElementById('btn-save-student');
  const name  = document.getElementById('s-name').value.trim();
  const phone = document.getElementById('s-phone').value.trim();
  if (!name || !phone) { showToast('Name and phone are required', 'warning'); return; }
  const body = { name, phone, email: document.getElementById('s-email').value.trim(), grade: document.getElementById('s-grade').value.trim(), parent_contact: document.getElementById('s-parent').value.trim() };
  setSubmitting(btn, true);
  try {
    const { ok, data, networkError, message } = editingId
      ? await api.patch(`/api/users/students/${editingId}/`, body)
      : await api.post('/api/users/students/', body);
    if (networkError) showToast(message, 'error');
    else if (!ok) showToast(message || formatApiError(data), 'error');
    else { showToast(editingId ? 'Student updated!' : 'Student added!', 'success'); closeModal('add-student-modal'); loadStudents(); }
  } catch (err) { showToast(err.message || 'Network error', 'error'); }
  setSubmitting(btn, false);
});

loadStudents();
</script>
