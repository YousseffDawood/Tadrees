<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Tadrees</title>
  <meta name="description" content="Staff login for Tadrees Education Center Management System" />
  <link rel="stylesheet" href="css/style.css?v=2" />
  <style>
    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="login-page">
    <!-- Left panel -->
    <div class="login-left">
      <img class="login-left-bg" src="wallpapers/login.jpg" alt="" onerror="this.style.display='none'" />
      <div class="login-left-content">
        <div class="login-logo">
          <img src="wallpapers/CENTER_LOGO.png" alt="Logo" onerror="this.style.display='none'" />
        </div>
        <p class="login-tagline">Tadrees<br />Management System</p>
        <p class="login-sub">Manage students, teachers, sessions, and more — all in one place.</p>
      </div>
    </div>

    <!-- Right panel -->
    <div class="login-right">
      <div class="login-form-wrap">
        <h1 class="login-form-title">Welcome back</h1>
        <p class="login-form-sub">Sign in to your account</p>

        <div id="login-error"
          style="display:none; margin-bottom:16px; padding:12px 14px; background:var(--danger-light); border:1px solid #FCA5A5; border-radius:var(--radius-sm); color:var(--danger); font-size:14px;">
        </div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="username">Username <span>*</span></label>
            <div class="input-icon-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
              </svg>
              <input class="form-control" type="text" id="username" name="username" placeholder="Enter username"
                required autocomplete="username" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password <span>*</span></label>
            <div class="input-icon-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input class="form-control" type="password" id="password" name="password" placeholder="Enter password"
                required autocomplete="current-password" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="login-btn"
            style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
            Sign In
          </button>
        </form>
        <p class="login-footer-text" style="margin-top:24px; color:var(--text-light); font-size:12px;">
          Tadrees &copy; 2025 · Education Center Management
        </p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('access')) {
      window.location.href = 'index.html';
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errBox = document.getElementById('login-error');
      errBox.style.display = 'none';
      setSubmitting(btn, true);

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        let res;
        try {
          res = await fetch(`${API_BASE}/api/users/login/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
        } catch {
          throw new Error(getApiNetworkMessage());
        }

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('access',  data.access);
        localStorage.setItem('refresh', data.refresh);
        localStorage.setItem('role',    data.role);
        localStorage.setItem('user',    JSON.stringify({ name: data.name, id: data.user_id }));

        window.location.href = 'index.html';
      } catch (err) {
        errBox.textContent = err.message || getApiNetworkMessage();
        errBox.style.display = 'block';
        setSubmitting(btn, false);
      }
    });
  </script>
<script src="js/navbar.js?v=1"></script>
</body>

</html>
